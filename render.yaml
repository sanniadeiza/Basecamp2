services:
  - type: web
    name: basecamp2-web
    env: node
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: basecamp2-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 5000
    plan: free

databases:
  - name: basecamp2-db
    databaseName: basecamp2
    user: basecamp2user
    plan: free
